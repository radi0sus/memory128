<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>C128 VDC Memory</title>

<style>
@font-face {
  font-family: "C64 Pro Mono";
  src:
    url("./fonts/C64_Pro_Mono-STYLE.woff2") format("woff2"),
    url("./fonts/C64_Pro_Mono-STYLE.woff") format("woff"),
    url("./fonts/C64_Pro_Mono-STYLE.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

:root{
  --cw: 8px;
  --ch: 16px;
  --fs: 8px;
  --glyph-scale-y: 2;
  --bg:#000000;
  --fg:#42ffff;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body{
  display:grid;
  place-items:center;
}

#wrap{
  transform-origin:center center;
}

#screen{
  width:calc(80 * var(--cw));
  height:calc(25 * var(--ch));
  display:grid;
  grid-template-columns:repeat(80,var(--cw));
  grid-template-rows:repeat(25,var(--ch));
  background:var(--bg);
  color:var(--fg);
  font-family:"C64 Pro Mono", monospace;
  font-size:var(--fs);
  font-weight:normal;
  line-height:1;
  user-select:none;
  outline:none;
  gap:0;
  /* Cursor für klickbare Bereiche – wird per JS gesetzt */
  cursor:default;
}

.cell{
  width:var(--cw);
  height:var(--ch);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  white-space:pre;
  line-height:1;
}

.cell .g{
  display:block;
  width:1em;
  height:1em;
  line-height:1;
  text-align:center;
  transform:scaleY(var(--glyph-scale-y));
  transform-origin:center center;
}

/* Klickbare Zonen hervorheben */
.cell.clickable{
  cursor:pointer;
}

#license{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:3px 6px;
  font:18px system-ui,sans-serif;
  text-align:center;
  color:#42ffff;
  background:#000;
  opacity:.72;
}

#license a{
  color:#42ffff;
}
</style>
</head>

<script>
(() => {
"use strict";

const COLS = 80;
const ROWS = 25;

const root = getComputedStyle(document.documentElement);

const screen = document.getElementById("screen");

let cells    = [];

let stopped  = false;
let score    = 0;
let winTimer = null;
let winBlink = false;

const keysTop    = ["1","2","3","4","5","6","7","8"];
const keysBottom = ["Q","W","E","R","T","Y","U","I"];
const allKeys    = keysTop.concat(keysBottom);

// Pixel-Position der Buchstaben (Zeile 10 = Top-Keys, Zeile 22 = Bottom-Keys)
// Spalte: 4 + i*10
const KEY_ROW_TOP    = 10;
const KEY_ROW_BOTTOM = 22;

const cardPositions = [
  [1,1],  [11,1], [21,1], [31,1],
  [41,1], [51,1], [61,1], [71,1],
  [1,13], [11,13],[21,13],[31,13],
  [41,13],[51,13],[61,13],[71,13]

// ─── Hilfsfunktionen ────────────────────────────────────────────────

function H(str){
  return str.match(/[0-9a-f]{2}/gi).map(x => parseInt(x,16));
}

function screenByteToC64ProChar(byte){
  byte &= 0xff;
  let reverse = byte >= 0x80;
  let sc = byte & 0x7f;
  let petscii;
  if     (sc <= 0x1f) petscii = 0x40 + sc;
  else if(sc <= 0x3f) petscii = sc;
  else if(sc <= 0x5f) petscii = 0x60 + (sc - 0x40);
  else                petscii = 0xa0 + (sc - 0x60);
  const base = reverse ? 0xe200 : 0xe000;
  return String.fromCodePoint(base + petscii);
}

// ─── Karten-Daten ───────────────────────────────────────────────────

// ─── Skalierung ─────────────────────────────────────────────────────

function cssPx(name){
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
}

// Aktueller Zoom-Faktor (für Koordinaten-Umrechnung)
let currentZoom = 1;

function fit(){
  const cw = cssPx("--cw");
  const ch = cssPx("--ch");
  const baseW = 80 * cw;
  const baseH = 25 * ch;
  let s = Math.min(
    Math.floor(window.innerWidth  / baseW),
    Math.floor((window.innerHeight - 20) / baseH)
  );
  if(s < 1) s = 1;
  currentZoom = s;
  wrap.style.transform = "none";
  wrap.style.zoom = s;
}

window.addEventListener("resize", fit);

// ─── Zellen aufbauen ────────────────────────────────────────────────

function makeCells(){
  screen.innerHTML = "";
  cells = [];
  for(let y = 0; y < ROWS; y++){
    const row = [];
    for(let x = 0; x < COLS; x++){
      const el = document.createElement("div");
      el.className = "cell";
      el.textContent = " ";
      el.style.color = FG;
      el.style.backgroundColor = BG;
      el.style.gridColumn = String(x + 1);
      el.style.gridRow    = String(y + 1);
      screen.appendChild(el);
      row.push(el);
    }
    cells.push(row);
  }
}

// ─── Zeichnen ───────────────────────────────────────────────────────

function put(x, y, ch, fg=FG, bg=BG){
  if(x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
  const el = cells[y][x];
  el.innerHTML = "";
  el.style.color = fg;
  el.style.backgroundColor = bg;
  ch = ch || " ";
  if(ch === " "){ el.textContent = " "; return; }
  const span = document.createElement("span");
  span.className = "g";
  span.textContent = ch;
  el.appendChild(span);
}

function putScreenByte(x, y, byte){
  put(x, y, screenByteToC64ProChar(byte), FG, BG);
}

function write(x, y, text, fg=FG, bg=BG){
  Array.from(String(text).toUpperCase()).forEach((ch, i) => put(x+i, y, ch, fg, bg));
}

function clear(){
  for(let y = 0; y < ROWS; y++)
    for(let x = 0; x < COLS; x++)
      put(x, y, " ", FG, BG);
}

function drawByteTile(x, y, bytes){
  for(let row = 0; row < 8; row++)
    for(let col = 0; col < 8; col++)
      putScreenByte(x+col, y+row, bytes[row*8+col]);
}

function drawEmptyTile(index){
  const [x,y] = cardPositions[index];
  for(let yy = 0; yy < 8; yy++)
    for(let xx = 0; xx < 8; xx++)
      put(x+xx, y+yy, " ", FG, BG);
}

function drawBack(index){
  const [x,y] = cardPositions[index];
  drawByteTile(x, y, BACK_BYTES);
}

function drawFace(index){
  const [x,y] = cardPositions[index];
  drawByteTile(x, y, FACE_BYTES[deck[index].faceIndex]);
}

// ─── Clickable-Markierungen ─────────────────────────────────────────
//
// Wir markieren zwei Arten von Zellen als .clickable und speichern
// den Karten-Index als data-Attribut:
//   1. Alle 8×8 Zellen einer nicht-entfernten Karte
//   2. Die Buchstaben-Zellen (1 Zelle pro Karte)
//
// Das passiert nach jedem drawMain()-Aufruf.

function updateClickable(){
  document.querySelectorAll(".cell.clickable").forEach(el => {
    el.classList.remove("clickable");
    delete el.dataset.cardIndex;
    delete el.dataset.action;
  });

  if(stopped) return;

  for(let i = 0; i < 16; i++){
    const card = deck[i];
    if(card.removed) continue;

    const [cx, cy] = cardPositions[i];
    for(let dy = 0; dy < 8; dy++){
      for(let dx = 0; dx < 8; dx++){
        const el = cells[cy + dy][cx + dx];
        el.classList.add("clickable");
        el.dataset.cardIndex = String(i);
      }
    }

    const keyCol = 4 + i % 8 * 10;
    const keyRow = i < 8 ? KEY_ROW_TOP : KEY_ROW_BOTTOM;
    const keyEl  = cells[keyRow][keyCol];
    keyEl.classList.add("clickable");
    keyEl.dataset.cardIndex = String(i);
  }

  // EXIT: Spalten 72–79, Zeilen 23–24
  for(let row = 23; row <= 24; row++){
    for(let col = 72; col <= 79; col++){
      const el = cells[row][col];
      el.classList.add("clickable");
      el.dataset.action = "exit";
    }
  }
}

// ─── Spiel-Zeichnen ─────────────────────────────────────────────────

function drawKeys(){
  for(let i = 0; i < 8; i++){
    write(4 + i*10, KEY_ROW_TOP,    keysTop[i],    FG, BG);
    write(4 + i*10, KEY_ROW_BOTTOM, keysBottom[i], FG, BG);
  }
}

function drawScore(){
  write(1,  24, "SCORE:",          FG, BG);
  write(8,  24, String(score).padStart(3," "), FG, BG);
  write(12, 24, "(MAX 200)",       FG, BG);
  write(73, 24, "E(X)IT",          FG, BG);
}

function drawMain(){
  clear();
  for(let i = 0; i < 16; i++){
    const card = deck[i];
    if     (card.removed) drawEmptyTile(i);
    else if(card.faceUp)  drawFace(i);
    else                  drawBack(i);
  }
  drawKeys();
  drawScore();
  updateClickable();   // ← nach jedem Neuzeichnen aktualisieren
}

// ─── Boot ───────────────────────────────────────────────────────────

async function bootSequence(){
  clear();

  let cursorVisible = false;
  let cursorX = 0;
  let cursorY = 0;
  let cursorTimer = null;

  function startCursor(x, y){
    cursorX = x;
    cursorY = y;
    cursorVisible = false;
    if(cursorTimer) clearInterval(cursorTimer);
    cursorTimer = setInterval(() => {
      cursorVisible = !cursorVisible;
      putScreenByte(cursorX, cursorY, cursorVisible ? 0xA0 : 0x20);
    }, 400);
  }

  function stopCursor(){
    if(cursorTimer) clearInterval(cursorTimer);
    cursorTimer = null;
    putScreenByte(cursorX, cursorY, 0x20);
  }

  // ── Header ──
  write(14, 0, "COMMODORE BASIC V7.0  122365 BYTES FREE", FG, BG);
  write(17, 1, "(C)1986 COMMODORE ELECTRONICS, LTD.", FG, BG);
  write(20, 2, "(C)1977 MICROSOFT CORP.", FG, BG);
  write(22, 3, "ALL RIGHTS RESERVED", FG, BG);

  write(0, 5, "READY.", FG, BG);
  startCursor(0, 6);
  await wait(800);
  stopCursor();

  // ── LOAD-Befehl tippen ──
  const cmd = 'LOAD"*",8,1';
  for(let i = 0; i < cmd.length; i++){
    write(0, 6, cmd.slice(0, i+1), FG, BG);
    startCursor(i + 1, 6);
    await wait(55 + Math.random() * 40);
  }

  await wait(1200);
  stopCursor();
  await wait(1200);

  // ── SEARCHING ──
  write(0, 8, "SEARCHING FOR *", FG, BG);
  //startCursor(0, 9);
  await wait(1200);
  //stopCursor();

  // ── LOADING ──
  write(0, 9, "LOADING", FG, BG);
  //startCursor(0, 10);
  await wait(1200);
  //stopCursor();

  // ── READY. ──
  write(0, 10, "READY.", FG, BG);
  startCursor(0, 11);
  await wait(1200);
  stopCursor();

  // ── RUN tippen ──
  const run = 'RUN';
  for(let i = 0; i < run.length; i++){
    write(0, 11, run.slice(0, i+1), FG, BG);
    startCursor(i + 1, 11);
    await wait(55 + Math.random() * 40);
  }

  await wait(600);
  stopCursor();
  await wait(600);

  // ── Kurzes Flackern ──
//  for(let i = 0; i < 3; i++){
//    clear();
//    await wait(80);
//    write(0, 10, "RUN", FG, BG);
//    await wait(80);
//  }

  clear();
  await wait(200);

  // ── Spiel starten ──
  buildDeck();
  drawMain();
  screen.focus();
}
// ─── Deck ───────────────────────────────────────────────────────────

function buildDeck(){
  deck = [];
  for(let i = 0; i < 16; i++){
    const pair  = Math.floor(i / 2);
    const value = i % 2 === 0 ? pair + 1 : 255 - (pair + 1);
    deck.push({ faceIndex:i, pair, value, faceUp:false, removed:false });
  }
  shuffle(deck);
}

function shuffle(arr){
  for(let i = arr.length-1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ─── Spiel-Logik ────────────────────────────────────────────────────

function keyToIndex(key){
  return allKeys.indexOf(String(key).toUpperCase());
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function choose(index){
  if(busy || stopped) return;
  if(index < 0 || index >= 16) return;
  const card = deck[index];
  if(card.removed) return;
  if(card.faceUp && selected[0] !== index) return;

  card.faceUp = true;
  drawMain();
  selected.push(index);
  if(selected.length < 2) return;

  busy = true;
  const aIndex = selected[0];
  const bIndex = selected[1];
  const a = deck[aIndex];
  const b = deck[bIndex];

  await wait(1100);

  if(aIndex !== bIndex && a.value + b.value === 255){
    a.removed = b.removed = true;
    a.faceUp  = b.faceUp  = false;
    score += 25;
    if(score > 200) score = 200;
    playMatchSound();
  } else {
    a.faceUp = b.faceUp = false;
    if(aIndex !== bIndex){ score -= 5; if(score < 0) score = 0; }
  }

  selected = [];
  busy     = false;
  drawMain();
  checkWin();
}

function checkWin(){
  if(deck.every(c => c.removed)) showWin();
}

function showWin(){
  stopped  = true;
  winBlink = false;
  if(winTimer) clearInterval(winTimer);
  drawWin();
  winTimer = setInterval(() => { winBlink = !winBlink; drawWin(); }, 650);
}

function drawWin(){
  clear();

  if(winBlink){
    drawScore();
    write(30, 18, "PRESS X TO EXIT", FG, BG);
  } else {
    const logo = [
      "                                                                                ",
      "                                                                                ",
      "        YY    YY   OOOOOO   UU    UU        WW     WW  II  NN     NN           ",
      "         YY  YY   OO    OO  UU    UU        WW     WW  II  NNN    NN           ",
      "          YYYY    OO    OO  UU    UU        WW  W  WW  II  NN NN  NN           ",
      "           YY     OO    OO  UU    UU        WW WWW WW  II  NN  NN NN           ",
      "           YY     OO    OO  UU    UU        WWW   WWW  II  NN   NNNN           ",
      "           YY      OOOOOO    UUUUUU          WW   WW   II  NN    NNN           "
    ];
    for(let i = 0; i < logo.length; i++) write(0, 4+i, logo[i], FG, BG);
    drawScore();
    write(30, 18, "PRESS X TO EXIT", FG, BG);
  }

  // "PRESS X TO EXIT" in Zeile 18 klickbar machen (nach clear() neu setzen)
  for(let col = 30; col <= 44; col++){
    cells[18][col].classList.add("clickable");
    cells[18][col].dataset.action = "exit";
  }
}

function drawExit(){
  if(winTimer) clearInterval(winTimer);
  stopped = true;
  clear();
  write(0, 0, "READY.", FG, BG);

  // Blinkender Cursor
  let cursorVisible = false;
  setInterval(() => {
    cursorVisible = !cursorVisible;
    putScreenByte(0, 1, cursorVisible ? 0xA0 : 0x20);
  }, 400);
}

// ─── Sound ──────────────────────────────────────────────────────────

function playMatchSound(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ac    = new AC();
    const freqs = [330,440,550,660];
    let t = ac.currentTime;
    for(const f of freqs){
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.type            = "square";
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.06, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.13);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t); osc.stop(t+0.14);
      t += 0.15;
    }
  } catch(e){}
}

// ─── Eingabe: Tastatur ───────────────────────────────────────────────

window.addEventListener("keydown", e => {
  const key = e.key.toUpperCase();
  if(key === "X"){ e.preventDefault(); drawExit(); return; }
  if(stopped) return;
  const index = keyToIndex(key);
  if(index !== -1){ e.preventDefault(); choose(index); }
});

// ─── Eingabe: Maus & Touch ───────────────────────────────────────────
//
// Strategie:
//   - Ein einzelner Event-Listener auf #screen (Event-Delegation)
//   - Bei Klick/Touch: nächste Elternelement mit data-cardIndex suchen
//   - Touch: preventDefault() verhindert doppeltes Feuern (touch→mouse)

function handlePointer(e){
  // Ziel-Element ermitteln (auch bei Touch)
  let target;
  if(e.type === "touchend"){
    const touch = e.changedTouches[0];
    target = document.elementFromPoint(touch.clientX, touch.clientY);
  } else {
    target = e.target;
  }

  if(!target) return;

  // Nach oben suchen bis .cell mit data-Attribut
  const cell = target.closest("[data-card-index], [data-action]")
            || target.closest(".cell[data-card-index], .cell[data-action]");

  // Direkt am Element oder Parent-Zelle prüfen
  let el = target;
  while(el && el !== screen){
    if(el.dataset.cardIndex !== undefined){
      e.preventDefault();
      choose(parseInt(el.dataset.cardIndex, 10));
      return;
    }
    if(el.dataset.action === "exit"){
      e.preventDefault();
      drawExit();
      return;
    }
    el = el.parentElement;
  }
}

screen.addEventListener("click",    handlePointer);
screen.addEventListener("touchend", handlePointer, { passive: false });

// ─── Start ───────────────────────────────────────────────────────────

makeCells();
fit();
bootSequence();
