<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>C128 VDC Memory</title>

<style>
@font-face {
  font-family: "C64 Pro Mono";
  src:
    url("./fonts/C64_Pro_Mono-STYLE.woff2") format("woff2"),
    url("./fonts/C64_Pro_Mono-STYLE.woff") format("woff"),
    url("./fonts/C64_Pro_Mono-STYLE.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: block;
}

:root{
  /*
    C128 VDC 80×25 auf 4:3:
    80*10 = 800
    25*24 = 600
    Zeichen-Seitenverhältnis = 24/10 = 2.4
  */
  --cw: 8px;   /* statt 10px */
  --ch: 16px;  /* statt 24px */
  --fs: 8px;
  --glyph-scale-y: 2;

  --bg:#000000;
  --fg:#42ffff;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

body{
  display:grid;
  place-items:center;
}

#wrap{
  transform-origin:center center;
}

#screen{
  width:calc(80 * var(--cw));
  height:calc(25 * var(--ch));
  display:grid;
  grid-template-columns:repeat(80,var(--cw));
  grid-template-rows:repeat(25,var(--ch));
  background:var(--bg);
  color:var(--fg);
  font-family:"C64 Pro Mono", monospace;
  font-size:var(--fs);
  font-weight:normal;
  line-height:1;
  user-select:none;
  outline:none;
  gap:0;
}

.cell{
  width:var(--cw);
  height:var(--ch);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  white-space:pre;
  line-height:1;
}

.cell .g{
  display:block;
  width:1em;
  height:1em;
  line-height:1;
  text-align:center;
  transform:scaleY(var(--glyph-scale-y));
  transform-origin:center center;
}

#license{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:3px 6px;
  font:18px system-ui,sans-serif;
  text-align:center;
  color:#42ffff;
  background:#000;
  opacity:.72;
}

#license a{
  color:#42ffff;
}
</style>
</head>

const keysTop = ["1","2","3","4","5","6","7","8"];
const keysBottom = ["Q","W","E","R","T","Y","U","I"];
const allKeys = keysTop.concat(keysBottom);

const cardPositions = [
  [1,1],  [11,1], [21,1], [31,1],
  [41,1], [51,1], [61,1], [71,1],
  [1,13], [11,13], [21,13], [31,13],

function H(str){
  return str.match(/[0-9a-f]{2}/gi).map(x => parseInt(x,16));
}

/*
  Wichtig:
  Die Bytes sind VDC/C128-Screen-Zeichen.
  High-Bit gesetzt = Reverse-Darstellung.
  Für den Font wird das High-Bit entfernt und dann in C64-Pro-Mono-Zeichen übersetzt.
*/
function screenByteToC64ProChar(byte){
  byte &= 0xff;

  /*
    C64 Pro Mono / Style64 Private Use Mapping.

    Uppercase/graphics, reverse off:
      PETSCII $20-$3F -> U+E020-$E03F
      PETSCII $40-$5F -> U+E040-$E05F
      PETSCII $60-$7F -> U+E060-$E07F
      PETSCII $A0-$BF -> U+E0A0-$E0BF

    Uppercase/graphics, reverse on:
      same logical PETSCII chars, but U+E200...
  */

  let petscii;
  let reverse = byte >= 0x80;
  let sc = byte & 0x7f;

  /*
    Reverse off screen-code to PETSCII:
      screen $00-$1F -> PETSCII $40-$5F
      screen $20-$3F -> PETSCII $20-$3F
      screen $40-$5F -> PETSCII $60-$7F
      screen $60-$7F -> PETSCII $A0-$BF
  */
  if(sc >= 0x00 && sc <= 0x1f){
    petscii = 0x40 + sc;
  }
  else if(sc >= 0x20 && sc <= 0x3f){
    petscii = sc;
  }
  else if(sc >= 0x40 && sc <= 0x5f){
    petscii = 0x60 + (sc - 0x40);
  }
  else {
    petscii = 0xa0 + (sc - 0x60);
  }

  const base = reverse ? 0xe200 : 0xe000;
  return String.fromCodePoint(base + petscii);
}

function cssPx(name){
  return parseFloat(
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
  );
}

function fit(){
  const cw = cssPx("--cw");
  const ch = cssPx("--ch");

  const baseW = 80 * cw;
  const baseH = 25 * ch;

  const availableW = window.innerWidth;
  const availableH = window.innerHeight - 20;

  // Nur ganzzahlige Skalierungen erlauben: 1x, 2x, 3x...
  let s = Math.min(
    Math.floor(availableW / baseW),
    Math.floor(availableH / baseH)
  );
  if(s < 1) s = 1;

  // zoom statt transform:scale
  wrap.style.transform = "none";
  wrap.style.zoom = s;
}

window.addEventListener("resize", fit);

function makeCells(){
  screen.innerHTML = "";
  cells = [];

  for(let y=0;y<ROWS;y++){
    const row = [];

    for(let x=0;x<COLS;x++){
      const el = document.createElement("div");
      el.className = "cell";
      el.textContent = " ";
      el.style.color = FG;
      el.style.backgroundColor = BG;
      el.style.gridColumn = String(x + 1);
      el.style.gridRow = String(y + 1);
      screen.appendChild(el);
      row.push(el);
    }

    cells.push(row);
  }
}

function put(x,y,ch,fg=FG,bg=BG){
  if(x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

  const el = cells[y][x];

  el.innerHTML = "";
  el.style.color = fg;
  el.style.backgroundColor = bg;

  ch = ch || " ";

  if(ch === " "){
    el.textContent = " ";
    return;
  }

  const span = document.createElement("span");
  span.className = "g";
  span.textContent = ch;

  el.appendChild(span);
}

function putScreenByte(x,y,byte){
  const ch = screenByteToC64ProChar(byte);

  /*
    Wichtig:
    NICHT manuell Vorder-/Hintergrund invertieren.
    Der Font-Glyph selbst ist bereits Reverse, wenn byte >= $80 ist.
  */
  put(x,y,ch,FG,BG);
}

function write(x,y,text,fg=FG,bg=BG){
  const chars = Array.from(String(text).toUpperCase());

  for(let i=0;i<chars.length;i++){
    put(x+i,y,chars[i],fg,bg);
  }
}

function clear(){
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      put(x,y," ",FG,BG);
    }
  }
}

function drawByteTile(x,y,bytes){
  for(let row=0;row<8;row++){
    for(let col=0;col<8;col++){
      const b = bytes[row * 8 + col];
      putScreenByte(x+col,y+row,b);
    }
  }
}

function drawEmptyTile(index){
  const [x,y] = cardPositions[index];

  for(let yy=0;yy<8;yy++){
    for(let xx=0;xx<8;xx++){
      put(x+xx,y+yy," ",FG,BG);
    }
  }
}

function drawBack(index){
  const [x,y] = cardPositions[index];
  drawByteTile(x,y,BACK_BYTES);
}

function drawFace(index){
  const [x,y] = cardPositions[index];
  drawByteTile(x,y,FACE_BYTES[deck[index].faceIndex]);
}

function drawKeys(){
  for(let i=0;i<8;i++){
    write(4 + i*10,10,keysTop[i],FG,BG);
    write(4 + i*10,22,keysBottom[i],FG,BG);
  }
}

function drawScore(){
  write(1,24,"SCORE:",FG,BG);
  write(8,24,String(score).padStart(3," "),FG,BG);
  write(12,24,"(MAX 200)",FG,BG);
  write(73,24,"E(X)IT",FG,BG);
}

function drawMain(){
  clear();

  for(let i=0;i<16;i++){
    const card = deck[i];

    if(card.removed){
      drawEmptyTile(i);
    }
    else if(card.faceUp){
      drawFace(i);
    }
    else{
      drawBack(i);
    }
  }

  drawKeys();
  drawScore();
}

function buildDeck(){
  deck = [];

  for(let i=0;i<16;i++){
    const pair = Math.floor(i / 2);
    const value = i % 2 === 0 ? pair + 1 : 255 - (pair + 1);

    deck.push({
      faceIndex:i,
      pair,
      value,
      faceUp:false,
      removed:false
    });
  }

  shuffle(deck);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}

function keyToIndex(key){
  return allKeys.indexOf(String(key).toUpperCase());
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve,ms));
}

async function choose(index){
  if(busy || stopped) return;
  if(index < 0 || index >= 16) return;

  const card = deck[index];

  if(card.removed) return;

  /*
    Gleiche Karte nochmal wählen ist im Original möglich.
    Sie wird dann nach kurzer Zeit einfach wieder zurückgesetzt.
  */
  if(card.faceUp && selected[0] !== index) return;

  card.faceUp = true;
  drawMain();

  selected.push(index);

  if(selected.length < 2){
    return;
  }

  busy = true;

  const aIndex = selected[0];
  const bIndex = selected[1];

  const a = deck[aIndex];
  const b = deck[bIndex];

  await wait(1100);

  if(aIndex !== bIndex && a.value + b.value === 255){
    a.removed = true;
    b.removed = true;
    a.faceUp = false;
    b.faceUp = false;

    score += 25;
    if(score > 200) score = 200;

    playMatchSound();
  }
  else{
    a.faceUp = false;
    b.faceUp = false;

    if(aIndex !== bIndex){
      score -= 5;
      if(score < 0) score = 0;
    }
  }

  selected = [];
  busy = false;

  drawMain();
  checkWin();
}

function checkWin(){
  if(deck.every(c => c.removed)){
    showWin();
  }
}

function showWin(){
  stopped = true;
  winBlink = false;

  if(winTimer) clearInterval(winTimer);

  drawWin();

  winTimer = setInterval(() => {
    winBlink = !winBlink;
    drawWin();
  },650);
}

function drawWin(){
  clear();

  if(winBlink){
    drawScore();
    write(30,18,"PRESS X TO EXIT",FG,BG);
    return;
  }

  const logo = [
    "                                                                                ",
    "                                                                                ",
    "        YY    YY   OOOOOO   UU    UU        WW     WW  II  NN     NN           ",
    "         YY  YY   OO    OO  UU    UU        WW     WW  II  NNN    NN           ",
    "          YYYY    OO    OO  UU    UU        WW  W  WW  II  NN NN  NN           ",
    "           YY     OO    OO  UU    UU        WW WWW WW  II  NN  NN NN           ",
    "           YY     OO    OO  UU    UU        WWW   WWW  II  NN   NNNN           ",
    "           YY      OOOOOO    UUUUUU          WW   WW   II  NN    NNN           "
  ];

  for(let i=0;i<logo.length;i++){
    write(0,4+i,logo[i],FG,BG);
  }

  drawScore();
  write(30,18,"PRESS X TO EXIT",FG,BG);
}

function drawExit(){
  if(winTimer) clearInterval(winTimer);

  stopped = true;
  clear();

  write(0,0,"C128 VDC MEMORY",FG,BG);
  write(0,2,"PROGRAM ENDED",FG,BG);
  write(0,4,"READY.",FG,BG);
}

function playMatchSound(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;

    const ac = new AC();
    const freqs = [330,440,550,660];

    let t = ac.currentTime;

    for(const f of freqs){
      const osc = ac.createOscillator();
      const gain = ac.createGain();

      osc.type = "square";
      osc.frequency.value = f;

      gain.gain.setValueAtTime(0.06,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.13);

      osc.connect(gain);
      gain.connect(ac.destination);

      osc.start(t);
      osc.stop(t+0.14);

      t += 0.15;
    }
  }catch(e){}
}

window.addEventListener("keydown", e => {
  const key = e.key.toUpperCase();

  if(key === "X"){
    e.preventDefault();
    drawExit();
    return;
  }

  if(stopped) return;

  const index = keyToIndex(key);

  if(index !== -1){
    e.preventDefault();
    choose(index);
  }
});

makeCells();
fit();
buildDeck();
drawMain();
screen.focus();

})();
</script>
</body>
